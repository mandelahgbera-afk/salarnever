    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Supabase preconnect: injected at runtime to avoid build-time placeholder warnings -->
    <script>
      (function() {
        var u = typeof __VITE_SUPABASE_URL__ !== 'undefined' ? __VITE_SUPABASE_URL__ : '';
        if (!u) {
          try { u = new URL(document.currentScript.src).origin; } catch(e) {}
        }
        // The real URL comes from the app's env vars at build time or from the meta tag below
        var m = document.querySelector('meta[name="x-supabase-url"]');
        if (m) u = m.content;
        if (u && u.startsWith('https://') && !u.includes('localhost')) {
          var dns = document.createElement('link');
          dns.rel = 'dns-prefetch';
          dns.href = u;
          document.head.appendChild(dns);
          var pre = document.createElement('link');
          pre.rel = 'preconnect';
          pre.href = u;
          document.head.appendChild(pre);
        }
      })();
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cryptocurrency Exchange" } }
        ]
